# /etc/nginx/sites-available/maltaluxuryrealestate.com
# Next.js 15 App Router — port 3100
# Wygenerowany automatycznie przez scripts/vps-first-run.sh
# NIE EDYTUJ recznie — nadpisywany przy konfiguracji

server {
    listen 80;
    server_name maltaluxuryrealestate.com www.maltaluxuryrealestate.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maltaluxuryrealestate.com www.maltaluxuryrealestate.com;

    # SSL — Certbot manages renewal
    ssl_certificate     /etc/letsencrypt/live/maltaluxuryrealestate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maltaluxuryrealestate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Next.js static assets — immutable cache (content-hashed filenames)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_bypass "";
    }

    # Public assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=86400";
    }

    # Sitemap + robots — short cache
    location ~* \.(xml|txt)$ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=3600";
    }

    # All other requests -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
