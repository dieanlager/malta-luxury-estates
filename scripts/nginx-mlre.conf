proxy_cache_path /var/cache/nginx/nextimg levels=1:2 keys_zone=nextimg:50m max_size=2g inactive=30d use_temp_path=off;

# /etc/nginx/sites-available/maltaluxuryrealestate.com
# Next.js 15 App Router -- port 3100

server {
    listen 80;
    server_name maltaluxuryrealestate.com www.maltaluxuryrealestate.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maltaluxuryrealestate.com www.maltaluxuryrealestate.com;

    ssl_certificate     /etc/letsencrypt/live/maltaluxuryrealestate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maltaluxuryrealestate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Optimised images ─────────────────────────────────────────────────────
    # nginx caches for 30 days; browser gets 7-day cache (override Next.js max-age=60)
    location /_next/image {
        proxy_cache nextimg;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://127.0.0.1:3100;
    }

    # ── Next.js static assets (content-hashed) ───────────────────────────────
    # ^~ takes priority over regex locations below — ensures fonts get immutable
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public static files (images, icons etc.) ─────────────────────────────
    # proxy_hide_header strips Next.js max-age=0; we set 1 year
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        proxy_pass http://127.0.0.1:3100;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Sitemap + robots ─────────────────────────────────────────────────────
    location ~* \.(xml|txt)$ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Property photos (shared/uploads — survives deploys) ──────────────────
    location ^~ /uploads/ {
        alias /var/www/mlre/shared/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── All other requests -> Next.js ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
