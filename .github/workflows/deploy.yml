name: Build & Deploy Гўв‚¬вЂќ Malta Luxury Real Estate

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  DEPLOY_PATH: /var/www/mlre
  NEXT_PORT: '3100'
  PM2_NAME: mlre-web

jobs:
  build-and-deploy:
    name: Build (ubuntu-latest) ГўвЂ вЂ™ Deploy (VPS)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ГўвЂќв‚¬ГўвЂќв‚¬ 1. Checkout ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - uses: actions/checkout@v4

      # ГўвЂќв‚¬ГўвЂќв‚¬ 2. Node 22 + npm cache ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # ГўвЂќв‚¬ГўвЂќв‚¬ 3. Install (linux/amd64 ГўвЂ вЂ™ sharp builds natively, works on VPS) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Install dependencies
        run: npm ci

      # ГўвЂќв‚¬ГўвЂќв‚¬ 4. Build Next.js (1100+ SSG pages, 4 GB RAM limit) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Build
        run: NODE_OPTIONS=--max-old-space-size=4096 npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_SITE_URL: https://www.maltaluxuryrealestate.com
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || '' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || '' }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO || '' }}
          STRIPE_PRICE_FEATURED: ${{ secrets.STRIPE_PRICE_FEATURED || '' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL || '' }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY || 'changeme-set-in-github-secrets' }}

      # ГўвЂќв‚¬ГўвЂќв‚¬ 5. postbuild: copy static + public into standalone ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Copy assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # ГўвЂќв‚¬ГўвЂќв‚¬ 6. Write .env.production (secrets never touch process list / logs) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Write .env.production
        run: |
          cat > .env.production << ENVEOF
          NODE_ENV=production
          PORT=${{ env.NEXT_PORT }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_SITE_URL=https://www.maltaluxuryrealestate.com
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO=${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_FEATURED=${{ secrets.STRIPE_PRICE_FEATURED }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          ADMIN_KEY=${{ secrets.ADMIN_KEY }}
          ENVEOF

      # ГўвЂќв‚¬ГўвЂќв‚¬ 7. Package standalone + .env together ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Package release
        run: |
          RELEASE=$(date -u +%Y-%m-%d-%H%M)
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          cp .env.production .next/standalone/.env.production
          tar -czf release.tgz -C .next/standalone .
          echo "Packed $(du -sh release.tgz | cut -f1) Гўв‚¬вЂќ release $RELEASE"

      # ГўвЂќв‚¬ГўвЂќв‚¬ 8. SSH setup ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          KEY="${{ secrets.VPS_SSH_KEY }}"
          if printf '%s' "$KEY" | grep -q -- "-----BEGIN"; then
            echo "::error::VPS_SSH_KEY zawiera SUROWY klucz (-----BEGIN...). Musi byc base64. Na VPS uruchom: base64 -w0 /tmp/gha; echo"
            exit 1
          fi
          printf '%s' "$KEY" | base64 -d > ~/.ssh/deploy_key 2>/dev/null \
            || { echo "::error::base64 -d nie powiodl sie - sekret nie jest poprawnym base64"; exit 1; }
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking accept-new\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      # ГўвЂќв‚¬ГўвЂќв‚¬ 9. Create release dir + upload ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Upload release to VPS
        run: |
          ssh vps "mkdir -p ${{ env.DEPLOY_PATH }}/{releases/${{ env.RELEASE }},scripts,logs,shared}"
          scp scripts/deploy.sh scripts/rollback.sh vps:${{ env.DEPLOY_PATH }}/scripts/
          ssh vps "chmod +x ${{ env.DEPLOY_PATH }}/scripts/*.sh"
          sed -i 's/\xEF\xBB\xBF//g' scripts/nginx-mlre.conf
          scp scripts/nginx-mlre.conf vps:/tmp/nginx-mlre.conf
          ssh vps "cp /tmp/nginx-mlre.conf /etc/nginx/sites-available/maltaluxuryrealestate.com && \
            ln -sf /etc/nginx/sites-available/maltaluxuryrealestate.com /etc/nginx/sites-enabled/maltaluxuryrealestate.com && \
            nginx -t"
          scp release.tgz vps:${{ env.DEPLOY_PATH }}/releases/${{ env.RELEASE }}/

      # ГўвЂќв‚¬ГўвЂќв‚¬ 10. Run deploy script on VPS ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Deploy on VPS
        run: |
          ssh vps "bash ${{ env.DEPLOY_PATH }}/scripts/deploy.sh \
            ${{ env.RELEASE }} \
            ${{ env.NEXT_PORT }} \
            ${{ env.PM2_NAME }} \
            ${{ env.DEPLOY_PATH }}"

      # ГўвЂќв‚¬ГўвЂќв‚¬ 11. Live smoke test (via public URL after nginx switch) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Smoke test Гўв‚¬вЂќ SSR check
        run: |
          sleep 6
          BYTES=$(curl -sS --max-time 15 -A "Googlebot/2.1" \
            "https://www.maltaluxuryrealestate.com/insights/buying-property-in-malta-as-a-foreigner-2026" \
            | wc -c)
          echo "Googlebot response: ${BYTES} bytes"
          if [ "${BYTES}" -lt 10000 ]; then
            echo "ГўЕҐЕљ SSR FAILED (${BYTES} bytes < 10000) Гўв‚¬вЂќ check: ssh vps 'pm2 logs mlre-web --lines 50'"
            exit 1
          fi
          echo "ГўЕ›вЂ¦ SSR OK Гўв‚¬вЂќ ${BYTES} bytes (Googlebot sees real HTML)"

      # ГўвЂќв‚¬ГўвЂќв‚¬ 12. Job summary ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
      - name: Job summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ГўЕ›вЂ¦ Deploy sukces Гўв‚¬вЂќ ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
            echo "Live: https://www.maltaluxuryrealestate.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ГўЕҐЕљ Deploy failed Гўв‚¬вЂќ ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
            echo "Rollback: \`ssh vps 'bash ${{ env.DEPLOY_PATH }}/scripts/rollback.sh'\`" >> $GITHUB_STEP_SUMMARY
          fi

